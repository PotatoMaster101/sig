name: Rust
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Formatting
        run: cargo fmt --all --check --quiet

  test:
    name: Test
    needs: [ clippy, fmt ]
    strategy:
      fail-fast: true
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Run Tests
        run: cargo test --all-features --all-targets

  prepare-release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Prepare Release
    needs: [ test ]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create Release
        run: |
          gh release delete "${{ github.ref_name }}" --yes || true
          gh release create "${{ github.ref_name }}" --generate-notes --latest

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Release
    needs: [ prepare-release ]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    strategy:
      matrix:
        bin: [ sig ]
        platform: [
          { ext: macos-arm64, os: macos-latest },
          { ext: linux-amd64, os: ubuntu-latest },
          { ext: windows-amd64.exe, os: windows-latest },
        ]

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo build --release
      - name: Upload
        shell: sh
        run: |
          [ "${{ matrix.platform.os }}" = "windows-latest" ] && SRC="target/release/${{ matrix.bin }}.exe" || SRC="target/release/${{ matrix.bin }}"
          DEST="${{ matrix.bin }}-${{ matrix.platform.ext }}"
          mv "$SRC" "$DEST"
          gh release upload "${{ github.ref_name }}" "$DEST" --clobber
